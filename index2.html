<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PAN Overlay</title>

<style>
@page{
    size:A4;
    margin:0;
}

html,body{
    margin:0;
    padding:0;
    width:210mm;
    height:297mm;
    background:#fff;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
    font-family:Arial,Helvetica,sans-serif;
}

.page{
    width:210mm;
    height:297mm;
    position:relative;
    overflow:hidden;
}

/* Background Image */

.bg{
    position:absolute;

    width:397px;
    height:802px;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    background:url("background2.jpg") no-repeat center;
    background-size:contain;
}

/* Overlay */

.overlay{
    position:absolute;

    width:397px;
    height:802px;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    pointer-events:none;
}

/* =======================
   TEXT POSITIONS
   ======================= */

.n1{
    position:absolute;
    left:65px;
    top:361px;
    font-size:16px;
    font-weight:500;
}

.n2{
    position:absolute;
    left:113px;
    top:361px;
    font-size:16px;
    font-weight:500;
}

.n3{
    position:absolute;
    left:162px;
    top:361px;
    font-size:16px;
    font-weight:500;
}

.n4{
    position:absolute;
    left:210px;
    top:361px;
    font-size:16px;
    font-weight:500;
}

.n5{
    position:absolute;
    left:259px;
    top:361px;
    font-size:16px;
    font-weight:500;
}

.n6{
    position:absolute;
    left:308px;
    top:361px;
    font-size:16px;
    font-weight:500;
}

.name{
    position:absolute;
    left:69px;
    top:412px;
    font-size:16px;
    font-weight:500;
}

.dob{
    position:absolute;
    left:69px;
    top:508px;
    font-size:26px;
    font-weight:500;
}

.mobile{
    position:absolute;
    left:253px;
    top:293px;
    font-size:14px;
    font-weight:700;
}

/* Optional hidden border for alignment */
.debug{
    display:none;
    position:absolute;
    inset:0;
    border:1px solid red;
}
</style>

</head>

<body>

<div class="page">

    <div class="bg"></div>

    <div class="overlay">

        <div class="n1">##Q##</div>
		
		<div class="n2">##W##</div>
		
		<div class="n3">##E##</div>
		
		<div class="n4">##R##</div>
		
		<div class="n5">##T##</div>
		
		<div class="n6">##Y##</div>

        <div class="mobile">##MOBMASK##</div>

        <div class="debug"></div>

    </div>

</div>

</body>
</html>
