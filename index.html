<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PAN Application Form</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h3 { color: #333; text-align: center; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        label { font-weight: bold; margin-bottom: 5px; color: #555; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; text-transform: uppercase; }
        input[type="date"] { text-transform: none; }
        button { background-color: #28a745; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; width: 100%; }
        button:hover { background-color: #218838; }
    </style>
    <!-- Libraries -->
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
    <script src="https://unpkg.com/docxtemplater@3.37.10/build/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>

<div class="container">
    <h3>PAN Application</h3>
    <form id="panForm">
        <div class="form-group">
            <label>PAN Number</label>
            <input type="text" id="pan" placeholder="ABCDE1234F" maxlength="10" required>
        </div>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="FULL NAME" required>
        </div>
        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" id="dob" required>
        </div>
        <div class="form-group">
            <label>Mobile Number</label>
            <input type="text" id="mobile" maxlength="10" placeholder="9999999999" required>
        </div>
        <button type="button" onclick="processForm()">Generate Document</button>
    </form>
</div>

<script>
    async function processForm() {
        // 1. Data Retrieval
        const pan = document.getElementById('pan').value.toUpperCase().trim();
        const name = document.getElementById('name').value.toUpperCase().trim();
        const rawDob = document.getElementById('dob').value;
        const mobile = document.getElementById('mobile').value.trim();

        // 2. Validation
        const panRegex = /^[A-Z]{5}[0-9]{4}[A-Z]{1}$/;
        const mobileRegex = /^[6-9][0-9]{9}$/;

        if (!pan || !name || !rawDob || !mobile) {
            alert("All fields are compulsory!");
            return;
        }

        // --- Age Validation (18+) ---
        const dobDate = new Date(rawDob);
        const today = new Date();
        let age = today.getFullYear() - dobDate.getFullYear();
        const monthDiff = today.getMonth() - dobDate.getMonth();
        
        if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < dobDate.getDate())) {
            age--;
        }

        if (age < 18) {
            alert("Error: Applicant must be 18 years or older.");
            return;
        }
        // ---------------------------

        if (!panRegex.test(pan)) {
            alert("Invalid PAN format! Must be 5 letters, 4 digits, and 1 letter (e.g., ABCDE1234F).");
            return;
        }

        if (!mobileRegex.test(mobile)) {
            alert("Invalid Mobile Number! Please enter a valid 10-digit number.");
            return;
        }

        // 3. Processing
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const d = new Date(rawDob);
        const formattedDob = `${d.getDate()}-${months[d.getMonth()]}-${d.getFullYear()}`;
        const maskedMobile = mobile.substring(0, 2) + "xxxxxx" + mobile.substring(8);
        const rand = () => Math.floor(Math.random() * 10);

        try {
            const response = await fetch('https://raw.githubusercontent.com/aditimathur72628-maker/panpanpanpanpanpan/main/sample.docx');
            const content = await response.arrayBuffer();
            const zip = new PizZip(content);
            const doc = new docxtemplater(zip, { paragraphLoop: true, linebreaks: true });

            doc.setData({ 
                "A": pan, 
                "B": name, 
                "C": formattedDob, 
                "D": mobile, 
                "E": maskedMobile, 
                "F": rand(), "G": rand(), "H": rand(), "I": rand(), "J": rand(), "K": rand() 
            });
            
            doc.render();
            saveAs(doc.getZip().generate({ type: "blob" }), "Form_Result.docx");
        } catch (error) {
            alert("Error: Could not generate document. Check your internet connection.");
            console.error(error);
        }
    }
</script>
</body>
</html>
